<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
      name="viewport"
    />
    <title>Biathlon Shooting Assistant</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="assets/images/app-icon.png" />
    <link rel="icon" href="assets/images/app-icon.png" type="image/png" />
    <meta name="theme-color" content="#000000" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />
    <script src="js/core/config.js"></script>
    <script src="js/core/constants.js"></script>
    <script src="js/core/theme-manager.js"></script>
    <script src="js/services/api-service.js"></script>
    <script src="js/services/auth-guard.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#007AFF',
              'deep-charcoal': 'var(--color-bg)',
              'card-dark': 'var(--color-card)',
              'neon-green': '#32D74B',
              'neon-cyan': '#64D2FF',
              'off-white': 'var(--color-text)',
              'light-blue-info': '#8E8E93',
              'border-subtle': 'var(--color-border)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>

  <body class="text-off-white min-h-screen flex justify-center items-center bg-deep-charcoal">
    <div
      id="app-container"
      class="w-full max-w-[430px] h-[932px] bg-deep-charcoal relative overflow-hidden flex flex-col shadow-2xl md:rounded-[55px] md:border-8 md:border-zinc-800"
    >
      <header class="px-6 pt-8 pb-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <button id="backBtn" class="p-2 -ml-2 text-off-white/70 active:scale-90 transition-all">
              <span class="material-symbols-outlined text-[28px]">arrow_back_ios_new</span>
            </button>
            <div class="space-y-0.5">
              <h1
                class="text-2xl font-bold tracking-tight text-off-white"
                data-i18n="session_settings"
              ></h1>
              <p
                id="subtitleAndName"
                class="text-[11px] font-bold text-light-blue-info/60 uppercase tracking-[0.15em]"
              ></p>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto px-6 py-2 no-scrollbar space-y-8">
        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="auto_save"
            >
            </span>
          </div>
          <div class="bg-card-dark rounded-[24px] border border-subtle overflow-hidden">
            <div class="p-4 flex flex-col gap-3">
              <div class="flex items-center gap-4">
                <div
                  class="w-10 h-10 rounded-full bg-neon-cyan/10 flex items-center justify-center shrink-0"
                >
                  <span class="material-symbols-outlined text-neon-cyan">sync</span>
                </div>
                <div>
                  <h3 class="font-bold text-sm" data-i18n="auto_save"></h3>
                </div>
              </div>
              <div
                id="autoSaveSegment"
                class="grid grid-cols-3 gap-1.5 p-1.5 bg-black/20 rounded-2xl"
              >
                <button
                  class="auto-save-seg-btn flex flex-col items-center justify-center gap-1 py-2.5 px-2 rounded-xl text-[11px] font-bold transition-all text-zinc-500 active:scale-95"
                  data-value="false"
                >
                  <span data-i18n="auto_save_off"></span>
                </button>
                <button
                  class="auto-save-seg-btn flex flex-col items-center justify-center gap-1 py-2.5 px-2 rounded-xl text-[11px] font-bold transition-all text-zinc-500 active:scale-95"
                  data-value="null"
                >
                  <span data-i18n="auto_save_global"></span>
                </button>
                <button
                  class="auto-save-seg-btn flex flex-col items-center justify-center gap-1 py-2.5 px-2 rounded-xl text-[11px] font-bold transition-all text-zinc-500 active:scale-95"
                  data-value="true"
                >
                  <span data-i18n="auto_save_on"></span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="email"
            >
            </span>
          </div>
          <div class="bg-card-dark rounded-[24px] border border-subtle overflow-hidden">
            <div class="p-4 flex items-center justify-between border-b border-subtle/30">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                  <span class="material-symbols-outlined text-primary">mail</span>
                </div>
                <div>
                  <h3 class="font-bold text-sm" data-i18n="email_report"></h3>
                  <p class="text-[11px] text-light-blue-info/70" data-i18n="send_summary_after"></p>
                </div>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="emailReporting" class="sr-only peer" />
                <div
                  class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"
                ></div>
              </label>
            </div>
          </div>
        </section>

        <div id="email-recipients-info" class="hidden">
          <section>
            <div class="flex items-center justify-between mb-4 px-1">
              <span
                class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
                data-i18n="recipients"
              >
              </span>
              <button
                onclick="openAddRecipientModal()"
                class="text-[11px] font-bold text-primary uppercase tracking-wider"
                data-i18n="add"
              ></button>
            </div>
            <div id="session-recipient-list" class="space-y-2"></div>
            <p
              id="session-recipient-fallback"
              class="hidden text-[11px] italic text-light-blue-info/50 px-1 mt-2"
              data-i18n="using_global_recipients"
            ></p>
          </section>
        </div>

        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="sharing"
            >
            </span>
          </div>
          <div class="bg-card-dark rounded-[24px] border border-subtle overflow-hidden">
            <div class="p-4 flex items-center justify-between">
              <div class="flex items-center gap-4">
                <div
                  class="w-10 h-10 rounded-full bg-neon-cyan/10 flex items-center justify-center"
                >
                  <span class="material-symbols-outlined text-neon-cyan">hub</span>
                </div>
                <div>
                  <h3 class="font-bold text-sm" data-i18n="share_session"></h3>
                  <p
                    id="shareStatusLabel"
                    class="text-[11px] text-light-blue-info/70"
                    data-i18n="sharing_inactive"
                  ></p>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <span
                  id="shareCodeBadge"
                  class="hidden px-4 py-2 bg-neon-cyan/10 border border-neon-cyan/20 text-neon-cyan text-[18px] font-black rounded-lg tracking-widest"
                  >-----</span
                >
                <button
                  id="btn-toggle-share"
                  class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-primary active:scale-90 transition-all font-bold"
                >
                  <span class="material-symbols-outlined">share</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="athletes"
            ></span>
          </div>
          <div class="bg-card-dark rounded-[24px] border border-subtle overflow-hidden">
            <button
              id="athletes-toggle-btn"
              class="w-full p-4 flex items-center justify-between cursor-pointer hover:bg-card-dark/50 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                  <span class="material-symbols-outlined text-primary">person</span>
                </div>
                <div class="text-left">
                  <h3 class="font-bold text-sm text-off-white" data-i18n="athletes"></h3>
                  <p class="text-[11px] text-light-blue-info/70" id="athleteCountLabel"></p>
                </div>
              </div>
              <span
                id="athletes-chevron"
                class="material-symbols-outlined text-off-white/50 transition-transform"
                >expand_more</span
              >
            </button>
            <div id="athletes-options" class="hidden border-t border-subtle/30">
              <div id="athletesConfigList" class="space-y-3 p-4"></div>
              <div class="border-t border-subtle/30 p-4">
                <button
                  id="addAthletesBtn"
                  class="w-full py-2 text-primary font-bold text-sm uppercase tracking-wider hover:text-primary/80 transition-colors"
                  data-i18n="modify_list"
                ></button>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="intensity"
            >
            </span>
          </div>
          <div class="bg-card-dark rounded-[24px] border border-subtle overflow-hidden">
            <button
              id="intensity-toggle-btn"
              class="w-full p-4 flex items-center justify-between cursor-pointer hover:bg-card-dark/50 transition-colors"
            >
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                  <span class="material-symbols-outlined text-primary">favorite</span>
                </div>
                <div class="text-left">
                  <h3 class="font-bold text-sm text-off-white" data-i18n="intensity_label"></h3>
                  <div
                    id="intensity-display-settings"
                    class="flex items-center gap-1.5 px-2 py-1 rounded-full border border-subtle/50 mt-1.5 w-fit transition-all duration-200"
                    style="
                      background-color: #ffffff;
                      border-color: #9ca3af !important;
                      color: #374151;
                    "
                  >
                    <span
                      id="intensity-dot-settings"
                      class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                      style="background-color: #9ca3af"
                    ></span>
                    <span
                      id="intensity-label-settings"
                      class="text-xs font-black tracking-wide"
                      data-i18n="rest"
                    ></span>
                  </div>
                </div>
              </div>
              <span
                id="intensity-chevron"
                class="material-symbols-outlined text-off-white/50 transition-transform"
                >expand_more</span
              >
            </button>
            <div id="intensity-options" class="hidden border-t border-subtle/30">
              <div id="intensity-list" class="flex flex-col"></div>
            </div>
          </div>
        </section>

        <section>
          <div class="flex items-center gap-2 mb-4 px-1">
            <span
              class="text-[11px] font-black uppercase tracking-[0.2em] text-light-blue-info/70"
              data-i18n="export_session"
            >
            </span>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <button
              id="exportPdfBtn"
              class="flex flex-col items-center justify-center gap-2 p-4 bg-primary/10 border border-primary/20 rounded-2xl active:scale-[0.98] transition-all group"
            >
              <div
                class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center group-active:scale-90 transition-transform"
              >
                <span class="material-symbols-outlined text-primary">picture_as_pdf</span>
              </div>
              <span
                class="text-[10px] font-black uppercase tracking-wider text-primary"
                data-i18n="export_pdf"
              ></span>
            </button>
            <button
              id="exportExcelBtn"
              class="flex flex-col items-center justify-center gap-2 p-4 bg-neon-green/10 border border-neon-green/20 rounded-2xl active:scale-[0.98] transition-all group"
            >
              <div
                class="w-10 h-10 rounded-full bg-neon-green/20 flex items-center justify-center group-active:scale-90 transition-transform"
              >
                <span class="material-symbols-outlined text-neon-green">table_view</span>
              </div>
              <span
                class="text-[10px] font-black uppercase tracking-wider text-neon-green"
                data-i18n="export_excel"
              ></span>
            </button>
          </div>
        </section>

        <section class="pt-4">
          <button
            id="deleteSessionBtn"
            class="w-full p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-500 font-bold text-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          >
            <span class="material-symbols-outlined text-lg">delete</span>
            <span data-i18n="delete_session"></span>
          </button>
        </section>
      </main>
    </div>

    <div
      id="athletesModal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50"
    >
      <div
        class="bg-card-dark rounded-[32px] p-6 w-[92%] max-h-[80vh] flex flex-col border border-subtle shadow-2xl space-y-4"
      >
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-off-white" data-i18n="manage_athletes"></h2>
          <button
            id="closeAthletesModal"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-off-white/50"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div
          id="athletesSelectList"
          class="flex-1 overflow-y-auto space-y-2 no-scrollbar py-1"
        ></div>
        <button
          id="confirmAthletesBtn"
          class="w-full px-6 py-4 bg-primary text-white font-bold rounded-2xl active:scale-95 transition-all shadow-lg shadow-primary/20"
          data-i18n="update_participation"
        ></button>
      </div>
    </div>

    <div
      id="addRecipientModal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50"
    >
      <div
        class="bg-card-dark rounded-[32px] p-6 w-[92%] flex flex-col border border-subtle shadow-2xl space-y-4"
      >
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-off-white" data-i18n="add_recipient"></h2>
          <button
            onclick="closeAddRecipientModal()"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-off-white/50"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <input
          type="email"
          id="new-session-recipient-email"
          data-i18n="email_placeholder"
          class="w-full bg-off-white/5 border border-subtle rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary"
        />
        <button
          onclick="confirmAddRecipient()"
          class="w-full px-6 py-4 bg-primary text-white font-bold rounded-2xl active:scale-95 transition-all shadow-lg shadow-primary/20"
          data-i18n="add"
        ></button>
      </div>
    </div>

    <script src="js/core/lang.js"></script>
    <script src="js/utils/utils.js"></script>
    <script src="js/pages/session-settings.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        translateApp();
      });
    </script>
  </body>
</html>
